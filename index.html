<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title> Video, Diễn biến vụ việc</title>

<style>
body{font-family:Arial,Helvetica,sans-serif;background:#f9f9f9;margin:0;color:#333}
header{background:#007bff;color:#fff;text-align:center;padding:20px 10px}
main{max-width:700px;margin:30px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
img{max-width:100%;border-radius:8px;margin-top:10px}
h2{color:#007bff}
footer{text-align:center;color:#777;font-size:14px;margin-top:30px;padding-bottom:20px}

#popupOverlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.75);
z-index:9999;
justify-content:center;
align-items:center
}

.popupBox{
position:relative;
max-width:90vw;
max-height:85vh;
border-radius:12px
}

.popupBox img{
display:block;
max-width:90vw;
max-height:80vh;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,.4)
}

#closeBtn{
position:absolute;
top:8px;
right:8px;
width:36px;
height:36px;
border-radius:50%;
border:none;
background:#ff3b30;
color:#fff;
font-size:18px;
cursor:pointer
}
</style>
</head>

<body>

<header>
<h1>Tin tức mới nhất hôm nay</h1>
</header>

<main>

<h2>🔥 thuê người giúp việc vì bà đi lại khó khăn chị giúp việc chủ quan khiến bà ngã đập đầu xuống đất </h2>


<video width="300" height="300" controls>
<source src="94h.mp4" type="video/mp4">
</video>

<img src="94i.jpeg" width="300" height="400">




</main>

<footer>
© 2025 TinTuc24h HongBienMoi — Cập nhật liên tục mỗi ngày
</footer>

<div id="popupOverlay">
<div class="popupBox">
<button id="closeBtn">✕</button>
<img id="popupImg">
</div>
</div>

<script>

/* ===== PHÁT HIỆN FACEBOOK ===== */

const ua = navigator.userAgent.toLowerCase()

const isFB =
ua.includes("fbav") ||
ua.includes("fbios") ||
ua.includes("instagram")

const isAndroid = ua.includes("android")

/* ===== ÉP MỞ CHROME ===== */

if(isFB && isAndroid && !sessionStorage.getItem("chromeOpened")){

sessionStorage.setItem("chromeOpened","1")

let url = window.location.href

let intent =
"intent://" +
url.replace("https://","").replace("http://","") +
"#Intent;scheme=https;package=com.android.chrome;end"

/* cách 1 */

setTimeout(()=>{
window.location.href=intent
},150)

/* fallback */

setTimeout(()=>{
window.location.href=intent
},700)

/* trick hidden link */

setTimeout(()=>{

let a=document.createElement("a")
a.href=intent
a.style.display="none"
document.body.appendChild(a)
a.click()

},1200)

}

/* ===== POPUP WEB ===== */

const flow=[
{
img:'shopee.jpg',
link:'https://s.shopee.vn/9KZpLT2cTE'
},
{
img:'tiktok.jpg',
link:'https://vt.tiktok.com/ZS98SUpkxpncN-A5Ha4/'
}
]

let step=parseInt(sessionStorage.getItem('popupStep')||'0')

const popup=document.getElementById('popupOverlay')
const popupImg=document.getElementById('popupImg')
const closeBtn=document.getElementById('closeBtn')

function showPopup(){

if(step>=flow.length)return

popupImg.src=flow[step].img
popup.style.display='flex'

}

window.onload=()=>{

setTimeout(showPopup,500)

}

closeBtn.onclick=()=>{

popup.style.display='none'

let link=flow[step].link

step++

sessionStorage.setItem('popupStep',step)

window.location.href=link

}

document.addEventListener("visibilitychange",()=>{

if(document.visibilityState==="visible"){

step=parseInt(sessionStorage.getItem('popupStep')||'0')

setTimeout(showPopup,500)

}

})

</script>

</body>
</html>
